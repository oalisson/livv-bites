<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LIVV BITES — Hero v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  /* ============ LIVV BITES — Hero (v2, wireframe) ============ */
  :root{
    --green-900:#122019; --green-800:#173124; --green-700:#1d3a2b;
    --green-600:#22402f; --green-400:#577061; --green-300:#88a091;
    --cream:#f4eee0; --cream-deep:#ece2cf; --beige:#efe6d2; --beige-deep:#e2d6bc;
    --gold:#bfa063; --gold-soft:#d8c79a; --wood:#a9794f;
    --text:#22302a; --muted:#6e6657; --border:#dbd0bb;
    --serif:"Cormorant Garamond", Georgia, serif;
    --sans:"Inter", system-ui, sans-serif;
    --ease:cubic-bezier(.22,1,.36,1);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{ background:var(--cream); color:var(--text); font-family:var(--sans); -webkit-font-smoothing:antialiased; }
  a{ color:inherit; text-decoration:none; }

  .hero{ position:relative; overflow:hidden;
    background:radial-gradient(75% 80% at 90% 30%, rgba(216,199,154,.22), transparent 60%), var(--cream); }
  .hero-grid{ max-width:1280px; margin:0 auto; display:grid; grid-template-columns:1fr 1.02fr; align-items:center;
    gap:clamp(20px,4vw,56px); min-height:min(88vh,720px); padding:clamp(40px,6vh,72px) clamp(24px,5vw,72px); }

  .eyebrow{ font-size:12px; letter-spacing:.32em; text-transform:uppercase; color:var(--gold); font-weight:600; }
  .hero h1{ font-family:var(--serif); font-weight:500; font-size:clamp(46px,7vw,86px); line-height:.98;
    letter-spacing:-.01em; color:var(--green-700); margin:18px 0 0; }
  .hero .gold-rule{ width:62px; height:2px; background:var(--gold); margin:22px 0; }
  .hero .lede{ font-size:17.5px; line-height:1.65; color:var(--muted); max-width:42ch; }
  .hero .lede strong{ color:var(--text); font-weight:600; }

  .cta-row{ display:flex; flex-wrap:wrap; gap:14px; margin-top:32px; }
  .btn{ display:inline-flex; align-items:center; justify-content:center; cursor:pointer; font-size:12.5px;
    letter-spacing:.14em; text-transform:uppercase; font-weight:600; padding:16px 32px; border-radius:999px;
    transition:transform .4s var(--ease), background .4s var(--ease); }
  .btn-primary{ background:var(--green-600); color:var(--cream); box-shadow:0 12px 28px -14px rgba(34,64,47,.7); }
  .btn-primary:hover{ background:var(--green-800); transform:translateY(-3px); }
  .btn-ghost{ background:transparent; color:var(--green-700); border:1px solid var(--green-600); }
  .btn-ghost:hover{ background:var(--green-600); color:var(--cream); transform:translateY(-3px); }

  .seals{ display:flex; flex-wrap:wrap; gap:12px 26px; margin-top:38px; padding-top:26px; border-top:1px solid var(--border); }
  .seals span{ display:flex; align-items:center; gap:8px; font-size:11.5px; letter-spacing:.08em; text-transform:uppercase; font-weight:600; color:var(--green-700); }
  .seals svg{ width:15px; height:15px; stroke:var(--gold); fill:none; stroke-width:1.8; }

  .hero-media{ position:relative; }
  .hero-media img{ width:100%; aspect-ratio:4/3; object-fit:cover; border-radius:16px; box-shadow:0 30px 60px -34px rgba(18,32,25,.45); }
  .medallion{ position:absolute; top:-22px; left:-22px; width:clamp(92px,11vw,128px); z-index:3;
    filter:drop-shadow(0 10px 22px rgba(18,32,25,.28)); }
  .medallion svg{ width:100%; display:block; }

  @keyframes rise{ from{opacity:0; transform:translateY(24px);} to{opacity:1; transform:none;} }
  @keyframes fade{ from{opacity:0;} to{opacity:1;} }
  .an{ opacity:0; animation:rise .9s var(--ease) forwards; }
  .a1{animation-delay:.05s;} .a2{animation-delay:.16s;} .a3{animation-delay:.27s;} .a4{animation-delay:.38s;} .a5{animation-delay:.49s;}
  .hero-media{ opacity:0; animation:fade 1.2s var(--ease) .2s forwards; }
  .medallion{ opacity:0; animation:rise .8s var(--ease) .7s forwards; }

  @media (max-width:880px){
    .hero-grid{ grid-template-columns:1fr; min-height:auto; }
    .hero-media{ order:-1; }
    .hero-media img{ aspect-ratio:4/3; }
    .medallion{ top:auto; bottom:-18px; left:auto; right:14px; }
  }
  @media (prefers-reduced-motion:reduce){ *{animation:none!important;} .an,.hero-media,.medallion{opacity:1;} }
</style>
</head>
<body>
<section class="hero">
  <div class="hero-grid">
    <div class="hero-copy">
      <span class="eyebrow an a1">Gourmet</span>
      <h1 class="an a2">Brazilian<br>Cheese Bread</h1>
      <div class="gold-rule an a3"></div>
      <p class="lede an a3">Golden, gluten-free Brazilian cheese bread made with <strong>real, recognizable ingredients</strong>. Frozen and baked fresh in minutes.</p>
      <div class="cta-row an a4">
        <a href="#shop" class="btn btn-primary">Shop the collection</a>
        <a href="#story" class="btn btn-ghost">Our story</a>
      </div>
      <div class="seals an a5">
        <span><svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>Gluten-Free</span>
        <span><svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>Clean Ingredients</span>
        <span><svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>No Artificial Preservatives</span>
        <span><svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>Made in Small Batches</span>
      </div>
    </div>
    <div class="hero-media">
      <div class="medallion"><svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg"><defs><path id="wo-circ" d="M60,60 m-43,0 a43,43 0 1,1 86,0 a43,43 0 1,1 -86,0"/></defs><circle cx="60" cy="60" r="58" fill="#f4eee0" opacity="0.94"/><circle cx="60" cy="60" r="58" fill="none" stroke="#bfa063" stroke-width="1.4"/><circle cx="60" cy="60" r="50" fill="none" stroke="#bfa063" stroke-width="0.8"/><text font-family="Inter, sans-serif" font-size="8.6" font-weight="600" letter-spacing="3.4" fill="#22402f"><textPath href="#wo-circ" startOffset="2%">WOMAN&#160;OWNED&#160;&#160;·&#160;&#160;LIVV&#160;BITES&#160;&#160;·&#160;&#160;</textPath></text><g transform="translate(60,30) scale(0.42)"><path d="M18 51 C17.4 43 18 36 18 28 C18 22 18.4 17 18 12" fill="none" stroke="#bfa063" stroke-width="1.7" stroke-linecap="round"/><g fill="#bfa063"><ellipse cx="11.5" cy="40" rx="2.1" ry="5.2" transform="rotate(-40 11.5 40)"/><ellipse cx="24.5" cy="36" rx="2.1" ry="5.2" transform="rotate(40 24.5 36)"/><ellipse cx="11" cy="30.5" rx="2" ry="5" transform="rotate(-34 11 30.5)"/><ellipse cx="25" cy="26.5" rx="2" ry="5" transform="rotate(34 25 26.5)"/><ellipse cx="18" cy="12.5" rx="1.9" ry="5" transform="rotate(5 18 12.5)"/></g></g><text x="60" y="74" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-weight="600" font-size="15" letter-spacing="1.5" fill="#22402f">WOMAN</text><text x="60" y="89" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-weight="600" font-size="15" letter-spacing="1.5" fill="#22402f">OWNED</text></svg></div>
      <img src="assets/lifestyle/hero-bowl.jpg" alt="Bowl of golden Brazilian cheese bread with an olive branch" />
    </div>
  </div>
</section>
</body>
</html>

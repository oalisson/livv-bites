<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LIVV BITES — How It Works v2</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  /* ============ LIVV BITES — From Freezer to Table (v2 / wireframe) ============ */
  :root{
    --green-900:#122019; --green-800:#173124; --green-700:#1d3a2b; --green-600:#22402f; --green-400:#577061;
    --cream:#f4eee0; --cream-deep:#ece2cf; --beige:#efe6d2; --beige-deep:#e2d6bc;
    --gold:#bfa063; --gold-soft:#d8c79a; --wood:#a9794f;
    --text:#22302a; --muted:#6e6657; --border:#dbd0bb;
    --serif:"Cormorant Garamond", Georgia, serif; --sans:"Inter", system-ui, sans-serif; --ease:cubic-bezier(.22,1,.36,1);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{ background:var(--beige); color:var(--text); font-family:var(--sans); -webkit-font-smoothing:antialiased; }
  a{ color:inherit; text-decoration:none; }

  .hiw{ background:var(--beige); overflow:hidden; }
  .hiw-grid{ display:grid; grid-template-columns:1fr 1.35fr 0.95fr; align-items:stretch; min-height:clamp(420px,52vh,540px); }

  /* left intro */
  .hiw-intro{ padding:clamp(40px,6vh,72px) clamp(24px,3.5vw,52px); display:flex; flex-direction:column; justify-content:center; }
  .hiw-intro h2{ font-family:var(--serif); font-weight:500; font-size:clamp(30px,3.4vw,44px); line-height:1.04; letter-spacing:.04em; text-transform:uppercase; color:var(--green-700); }
  .checks{ list-style:none; margin:26px 0 28px; display:flex; flex-direction:column; gap:12px; }
  .checks li{ display:flex; align-items:center; gap:11px; font-size:14.5px; color:var(--text); }
  .checks svg{ width:17px; height:17px; stroke:var(--gold); fill:none; stroke-width:2; flex:none; }
  .how-btn{ align-self:flex-start; background:var(--green-600); color:var(--cream); font-size:12px; letter-spacing:.14em; text-transform:uppercase; font-weight:600; padding:14px 30px; border-radius:999px; transition:background .35s var(--ease), transform .35s var(--ease); }
  .how-btn:hover{ background:var(--green-800); transform:translateY(-2px); }

  /* center steps card */
  .steps-card{ align-self:center; margin:clamp(24px,4vh,40px) 0; background:var(--cream); border:1px solid var(--border); border-radius:18px;
    box-shadow:0 20px 50px -34px rgba(18,32,25,.4); display:grid; grid-template-columns:repeat(3,1fr); }
  .step{ padding:clamp(22px,2.4vw,30px) clamp(16px,1.6vw,22px); text-align:center; position:relative; }
  .step + .step{ border-left:1px solid var(--border); }
  .step .n{ width:30px; height:30px; margin:0 auto 16px; border-radius:50%; border:1px solid var(--gold); color:var(--green-700); display:grid; place-items:center; font-family:var(--serif); font-size:15px; font-weight:600; }
  .step h3{ font-family:var(--serif); font-weight:600; font-size:19px; color:var(--green-700); margin-bottom:14px; }
  .step .ic{ height:46px; display:grid; place-items:center; margin-bottom:14px; }
  .step .ic svg{ width:42px; height:42px; stroke:var(--green-600); fill:none; stroke-width:1.4; stroke-linecap:round; stroke-linejoin:round; }
  .step p{ font-size:12.5px; line-height:1.5; color:var(--muted); }

  /* right photo */
  .hiw-photo{ position:relative; min-height:280px; }
  .hiw-photo img{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }

  .reveal{ opacity:0; transform:translateY(28px); transition:opacity .8s var(--ease), transform .8s var(--ease); }
  .reveal.in{ opacity:1; transform:none; }

  @media (max-width:980px){
    .hiw-grid{ grid-template-columns:1fr; }
    .hiw-intro{ text-align:center; align-items:center; }
    .steps-card{ margin:0 clamp(24px,5vw,40px) clamp(28px,5vh,40px); }
    .hiw-photo{ aspect-ratio:16/10; min-height:0; order:3; }
  }
  @media (max-width:560px){
    .steps-card{ grid-template-columns:1fr; }
    .step + .step{ border-left:none; border-top:1px solid var(--border); }
  }
  @media (prefers-reduced-motion:reduce){ *{transition:none!important;} .reveal{opacity:1;transform:none;} }
</style>
</head>
<body>
<section class="hiw">
  <div class="hiw-grid">

    <div class="hiw-intro reveal in">
      <h2>From Freezer<br>to Table<br>in Minutes</h2>
      <ul class="checks">
        <li><svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>No thawing required</li>
        <li><svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>Bake straight from frozen</li>
        <li><svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>Ready in about 25 minutes</li>
      </ul>
      <a class="how-btn" href="#shop">How to bake</a>
    </div>

    <div class="steps-card reveal">
      <div class="step">
        <span class="n">1</span>
        <div class="ic"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18M6.5 6.5h.01M9.5 6.5h.01"/></svg></div>
        <h3>Preheat Oven</h3>
        <p>Preheat to 370°F (188°C)</p>
      </div>
      <div class="step">
        <span class="n">2</span>
        <div class="ic"><svg viewBox="0 0 24 24"><rect x="3" y="8" width="18" height="9" rx="2"/><circle cx="8" cy="12.5" r="1.3"/><circle cx="13" cy="12.5" r="1.3"/><path d="M5 8V6.5M19 8V6.5"/></svg></div>
        <h3>Bake</h3>
        <p>Place frozen bites on a baking sheet.</p>
      </div>
      <div class="step">
        <span class="n">3</span>
        <div class="ic"><svg viewBox="0 0 24 24"><path d="M12 20s-7-4.3-7-9a4 4 0 0 1 7-2.6A4 4 0 0 1 19 11c0 4.7-7 9-7 9Z"/></svg></div>
        <h3>Enjoy</h3>
        <p>Bake for 25–30 minutes until golden.</p>
      </div>
    </div>

    <div class="hiw-photo reveal">
      <img src="assets/lifestyle/baking-tray.jpg" alt="Golden Brazilian cheese bread fresh from the oven on a baking tray" loading="lazy" />
    </div>

  </div>
</section>
</body>
</html>

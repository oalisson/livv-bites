<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@500;600&display=swap" rel="stylesheet" />
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{ --green:#22402f; --green-deep:#173124; --cream:#f4eee0; --gold:#bfa063; --gold-soft:#d8c79a; }
  body{ width:1200px; height:630px; overflow:hidden; font-family:"Inter",sans-serif; }
  .og{ width:1200px; height:630px; display:grid; grid-template-columns:548px 652px; }

  .panel{ position:relative; background:
      radial-gradient(80% 70% at 30% 20%, rgba(191,160,99,.14), transparent 60%), var(--green);
    color:var(--cream); padding:64px 60px; display:flex; flex-direction:column; justify-content:center; }
  .wheat{ margin-bottom:22px; }
  .wheat svg{ width:34px; height:48px; }
  .mark{ font-family:"Cormorant Garamond",serif; font-weight:500; font-size:74px; letter-spacing:18px; line-height:1; color:var(--cream); padding-left:18px; }
  .sub{ font-family:"Inter",sans-serif; font-weight:600; font-size:16px; letter-spacing:14px; color:var(--gold); margin-top:14px; padding-left:14px; }
  .rule{ width:64px; height:2px; background:var(--gold); margin:34px 0 26px; }
  .tag{ font-family:"Cormorant Garamond",serif; font-style:italic; font-weight:500; font-size:42px; line-height:1.15; color:var(--cream); }
  .seals{ margin-top:38px; display:flex; gap:18px; font-size:13px; letter-spacing:.12em; text-transform:uppercase; font-weight:600; color:var(--gold-soft); }
  .seals span{ display:flex; align-items:center; gap:8px; }
  .seals i{ width:5px; height:5px; border-radius:50%; background:var(--gold); display:inline-block; }

  .photo{ position:relative; }
  .photo img{ width:100%; height:100%; object-fit:cover; }
  .photo::after{ content:""; position:absolute; inset:0; box-shadow:inset 22px 0 40px -20px rgba(18,32,25,.55); }
</style>
</head>
<body>
  <div class="og">
    <div class="panel">
      <div class="wheat">
        <svg viewBox="7 7 22 45" width="38" height="56">
          <path d="M18 51 C17.4 43 18 36 18 28 C18 22 18.4 17 18 12" fill="none" stroke="#d8c79a" stroke-width="1.6" stroke-linecap="round"/>
          <g fill="#d8c79a">
            <ellipse cx="11.5" cy="40" rx="2.1" ry="5.2" transform="rotate(-40 11.5 40)"/>
            <ellipse cx="24.5" cy="36" rx="2.1" ry="5.2" transform="rotate(40 24.5 36)"/>
            <ellipse cx="11" cy="30.5" rx="2" ry="5" transform="rotate(-34 11 30.5)"/>
            <ellipse cx="25" cy="26.5" rx="2" ry="5" transform="rotate(34 25 26.5)"/>
            <ellipse cx="12.2" cy="21.5" rx="1.9" ry="4.6" transform="rotate(-29 12.2 21.5)"/>
            <ellipse cx="23.8" cy="18.5" rx="1.9" ry="4.6" transform="rotate(29 23.8 18.5)"/>
            <ellipse cx="18" cy="12.5" rx="1.9" ry="5" transform="rotate(5 18 12.5)"/>
          </g>
          <g fill="#bfa063"><circle cx="15.8" cy="42.5" r="1.5"/><circle cx="20.6" cy="38.5" r="1.5"/></g>
        </svg>
      </div>
      <div class="mark">LIVV BITES</div>
      <div class="sub">GOURMET</div>
      <div class="rule"></div>
      <div class="tag">Comfort food,<br>thoughtfully made.</div>
      <div class="seals">
        <span><i></i>Gluten-free</span>
        <span><i></i>Bone broth</span>
        <span><i></i>Woman-owned</span>
      </div>
    </div>
    <div class="photo">
      <img src="assets/lifestyle/packaging-traditional.jpg" alt="" />
    </div>
  </div>
</body>
</html>
